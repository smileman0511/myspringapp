server:
  port: 10000
spring:
  cloud:
    aws:
      s3:
        bucket: ${S3_BUCKET}
        base-url: ${S3_BASE_URL}
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      region:
        static: ap-northeast-2
      stack:
        auto: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com
            protocols: TLSv1.2
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:1234}
      timeout: 60000
  cache:
    type: redis
  datasource:
    hikari:
      driver-class-name: oracle.jdbc.OracleDriver
      jdbc-url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/XE}
      username: ${ORACLE_USERNAME:hr}
      password: ${ORACLE_PASSWORD:1234}
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    cors:
      mappings:
        "/**":
          allowed-origins: ${CORS_ORIGIN:http://localhost:3000}
          allowed-methods: "*"
          allowed-headers: "*"
          allow-credentials: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:10000/login/oauth2/code/google}
            authorization-grant-type: authorization_code
            client-name: Google
            provider: google
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            scope:
              - name
              - email
            redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:10000/login/oauth2/code/naver}
            authorization-grant-type: authorization_code
            client-name: Naver
            provider: naver
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            scope:
              - profile_nickname
              - account_email
              - profile_image
            redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:10000/login/oauth2/code/kakao}
            authorization-grant-type: authorization_code
            client-name: Kakao
            provider: kakao
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: name
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET:myverylongsecretkeythatis256bitlong1234567890abcdefgh}
  token-blacklist-prefix: "blacklist:"
  refresh-blacklist-prefix: "refresh:"

